name: ShieldAML Backend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup PHP Environment
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd
        coverage: none

    - name: Install PHP Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      working-directory: backend

    - name: Configure Environment File
      run: cp .env.example .env
      working-directory: backend

    - name: Generate Application Security Key
      run: php artisan key:generate
      working-directory: backend

    - name: Configure Testing Database Settings
      run: |
        sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/g' .env
        sed -i 's/DB_DATABASE=laravel/DB_DATABASE=:memory:/g' .env
      working-directory: backend

    - name: Run Test Suites
      run: php artisan test
      working-directory: backend
